<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link rel="stylesheet"href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
     <link rel="stylesheet"href="../node_modules/bootstrap/dist/css/bootstrap.css">
     <script>
        function AmountChange(){
            document.getElementById("txtAmount").value=document.getElementById("amountRange").value;
        }
        function yearChange(){
          document.getElementById("txtYears").value=document.getElementById("txtYears").value=
          document.getElementById("YearRange").value;  
        }
        function RateChange(){
            document.getElementById("txtRate").value=document.getElementById("rateRange").value;
        }
        function CalculateClick(){
            var P = parseInt(document.getElementById("txtAmount").value);
             var r = parseFloat(document.getElementById("txtRate").value)/12/100;
             var n = parseInt(document.getElementById("txtYears").value)*12;
             var EMI = P * r *Math.pow(1+r,n)/(Math.pow(1+r,n)-1);
             document.getElementById("lblResult").innerHTML="Your monthly installment amount is " + Math.round
             (EMI).toLocaleString('en-IN',{style:"currency",currency:'INR',minimumFractionDigits:0})+"for next"+n+"months";
        }
        
     </script>
</head>
<body class="bg-secondary">
    <div class="m-4 bglight p-3">
        <div class="fs-5 fw-bold text-center">Personal Loan EMi Calulator</div>
        <div class="row my-4">
            <div class="col">
                Amount You Need &#8377;
                <input type="text"size="14"id="txtAmount">
            </div>
            <div class="col">
                For
                <input type="text"id="txtYears"size="2">  Years
            </div>
            <div class="col">
                Interest rate
                <input type="text"id="txtRate"size="2">  %
            </div>
        </div>
        <div class="my-4 row">
            <div class="col">
                <input type="range"onchange="AmountChange()"class="form-range"min="100000"
                step="10000"max="1000000"value="100000"id="amountRange">
                <div>
                    <span>&#8377;1,00,000/-</span>
                    <span class="float-end">&#8377;10,00,000/-</span>
                </div>
            </div>
            <div class="col">
                <input type="range"onchange="yearChange()"class="form-range"min="1"max="5"value="1"
                id="YearRange">
                <div>
                    <span>1 Year</span>
                    <span class="float-end">5 years</span>
                </div>
            </div>
            <div class="col">
                 <input type="range"onchange="RateChange()"class="form-range"min="10.45"max="18.45"value="10.45%"
              step="0.01"  id="rateRange">
                <div>
                    <span>10.45%</span>
                    <span class="float-end">18.45%</span>
             </div>
        </div>
    </div>
    <div class="row my-4">
        <div class="col text-end">
            <button class="btn btn-primary"onclick="CalculateClick()">Calculate</button>
        </div>
    </div>
    <div class="my-4 text-center">
        <span class="fs-4 fw-bold"id="lblResult"></span>
    </div>
    </div>
   <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script> 
   <script src="../node_modules/jquery/dist/jquery.js"></script>
</body>
</html>
